<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR generator — n3x7</title>
<meta name="description" content="Generator styliziranih QR kod z logotipom ali tekstom na sredini.">
<script src="https://unpkg.com/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>
<style>
  :root {
    --bg: #0f1117; --panel: #181c25; --border: #2a3040;
    --text: #e6e9f0; --muted: #8b93a7; --accent: #0ea5e9; --err: #f87171;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  body {
    margin: 0; font-family: system-ui, sans-serif; background: var(--bg);
    color: var(--text); min-height: 100vh;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 22px; margin: 0 0 20px; }
  h1 span { color: var(--accent); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  label.field { display: block; margin-bottom: 14px; font-size: 13px; color: var(--muted); }
  .field > .row { margin-top: 5px; }
  input[type=text], input[type=number], select {
    width: 100%; padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  input[type=color] {
    width: 42px; height: 38px; padding: 2px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); cursor: pointer; flex-shrink: 0;
  }
  .row { display: flex; gap: 8px; align-items: center; }
  .row input[type=text] { flex: 1; }
  .radios { display: flex; gap: 14px; margin-top: 5px; }
  .radios label { display: flex; gap: 5px; align-items: center; font-size: 14px; color: var(--text); cursor: pointer; }
  .subfield { margin-top: 8px; }
  .check { display: flex; gap: 7px; align-items: center; font-size: 13px; color: var(--muted); margin-bottom: 14px; cursor: pointer; }
  button#run {
    width: 100%; padding: 13px; font-size: 16px; font-weight: 600; border: 0;
    border-radius: 10px; background: var(--accent); color: #06121a; cursor: pointer;
  }
  button#run:hover { filter: brightness(1.1); }
  button#run:disabled { opacity: .5; cursor: wait; }
  .result { text-align: center; }
  .result img {
    max-width: 100%; max-height: 420px; border-radius: 10px;
    background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 0 0/16px 16px;
  }
  .error { color: var(--err); font-size: 14px; margin-top: 10px; white-space: pre-wrap; }
  a.dl {
    display: inline-block; margin-top: 12px; padding: 10px 22px; border-radius: 10px;
    background: var(--accent); color: #06121a; font-weight: 600; text-decoration: none; font-size: 15px;
  }
  .hint { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .placeholder { color: var(--muted); font-size: 14px; padding: 60px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1><span>QR</span> generator</h1>
  <div class="grid">
    <div class="panel">
      <label class="field">URL / vsebina kode *
        <div class="row"><input type="text" id="url" placeholder="https://oslea.si"></div>
      </label>

      <label class="field">Tema (preset)
        <div class="row"><select id="theme"><option value="">— brez —</option></select></div>
      </label>

      <label class="field">Sredina
        <div class="radios">
          <label><input type="radio" name="center" value="none" checked> Nič</label>
          <label><input type="radio" name="center" value="image"> Slika</label>
          <label><input type="radio" name="center" value="text"> Tekst</label>
        </div>
        <div class="subfield" id="centerImageField" hidden>
          <input type="file" id="logoFile" accept="image/png,image/jpeg,image/svg+xml,image/webp">
        </div>
        <div class="subfield" id="centerTextField" hidden>
          <input type="text" id="centerText" placeholder="npr. OSLEA" maxlength="12">
        </div>
      </label>

      <label class="field">Barva pik (hex)
        <div class="row">
          <input type="color" id="colorPick" value="#1e293b">
          <input type="text" id="color" value="#1e293b">
        </div>
      </label>

      <label class="check"><input type="checkbox" id="useGradient"> Gradient (druga barva)</label>
      <label class="field" id="gradientField" hidden>Druga barva gradienta (hex)
        <div class="row">
          <input type="color" id="gradient2Pick" value="#8b5cf6">
          <input type="text" id="gradient2" value="#8b5cf6">
        </div>
      </label>

      <label class="field">Barva ozadja (hex)
        <div class="row">
          <input type="color" id="bgPick" value="#ffffff">
          <input type="text" id="bg" value="#ffffff">
        </div>
      </label>

      <label class="check"><input type="checkbox" id="useCorner"> Posebna barva kotov</label>
      <label class="field" id="cornerField" hidden>Barva kotov (hex)
        <div class="row">
          <input type="color" id="cornerColorPick" value="#1e293b">
          <input type="text" id="cornerColor" value="#1e293b">
        </div>
      </label>

      <label class="field">Oblika pik
        <div class="row"><select id="dotStyle">
          <option value="square">Oglata</option>
          <option value="dots">Okrogla (pike)</option>
          <option value="rounded" selected>Zaobljena</option>
          <option value="classy">Classy</option>
          <option value="classy-rounded">Classy zaobljena</option>
          <option value="extra-rounded">Ekstra zaobljena</option>
        </select></div>
      </label>

      <label class="field">Velikost (px)
        <div class="row"><input type="number" id="size" value="2000" min="100" max="4000" step="100"></div>
      </label>

      <label class="field">Ime datoteke (opcijsko)
        <div class="row"><input type="text" id="filename" placeholder="qr-koda"></div>
      </label>

      <button id="run">Zaženi</button>
      <div class="error" id="error" hidden></div>
      <div class="hint">Vse se generira v tvojem brskalniku — nič se ne pošilja na strežnik.</div>
    </div>

    <div class="panel result" id="result">
      <div class="placeholder">Tu se prikaže generirana koda.</div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);

// Preset barvne teme — dodaj svoje po istem vzorcu.
const THEMES = {
  n3x7: {
    gradient: "#0ea5e9,#8b5cf6",
    bg: "#0b1220",
    cornerColor: "#22d3ee",
    dotStyle: "rounded",
  },
  oslea: {
    gradient: "#454547,#000000",
    bg: "#ede8e4",
    cornerColor: "#1c1c1e",
    dotStyle: "rounded",
  },
};

// --- sinhronizacija color picker <-> hex text ---
function syncColor(pickId, textId) {
  const pick = $(pickId), text = $(textId);
  pick.addEventListener("input", () => { text.value = pick.value; });
  text.addEventListener("input", () => {
    if (/^#[0-9a-fA-F]{6}$/.test(text.value.trim())) pick.value = text.value.trim();
  });
}
syncColor("colorPick", "color");
syncColor("bgPick", "bg");
syncColor("cornerColorPick", "cornerColor");
syncColor("gradient2Pick", "gradient2");

// --- prikaži/skrij podpolja ---
document.querySelectorAll("input[name=center]").forEach((r) =>
  r.addEventListener("change", () => {
    const v = document.querySelector("input[name=center]:checked").value;
    $("centerImageField").hidden = v !== "image";
    $("centerTextField").hidden = v !== "text";
  }),
);
$("useGradient").addEventListener("change", (e) => { $("gradientField").hidden = !e.target.checked; });
$("useCorner").addEventListener("change", (e) => { $("cornerField").hidden = !e.target.checked; });

// --- teme ---
for (const name of Object.keys(THEMES)) {
  const o = document.createElement("option");
  o.value = name; o.textContent = name;
  $("theme").appendChild(o);
}
$("theme").addEventListener("change", () => {
  const t = THEMES[$("theme").value];
  if (!t) return;
  const setColor = (textId, pickId, val) => {
    if (!val) return;
    $(textId).value = val;
    if (/^#[0-9a-fA-F]{6}$/.test(val)) $(pickId).value = val;
  };
  if (t.gradient) {
    const [c1, c2] = t.gradient.split(",");
    setColor("color", "colorPick", c1.trim());
    setColor("gradient2", "gradient2Pick", c2.trim());
    $("useGradient").checked = true;
    $("gradientField").hidden = false;
  } else if (t.color) {
    setColor("color", "colorPick", t.color);
    $("useGradient").checked = false;
    $("gradientField").hidden = true;
  }
  setColor("bg", "bgPick", t.bg);
  if (t.cornerColor) {
    setColor("cornerColor", "cornerColorPick", t.cornerColor);
    $("useCorner").checked = true;
    $("cornerField").hidden = false;
  }
  if (t.dotStyle) $("dotStyle").value = t.dotStyle;
});

// --- generiranje (vse client-side) ---

function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Slike ni bilo mogoče prebrati."));
    img.src = url;
  });
}

function blobToImage(blob) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(blob);
  });
}

// Zaobljena podlaga v barvi ozadja na sredini, da vsebina ne seka pik.
// Vsebina pokrije ~7 % površine — errorCorrectionLevel "H" (30 %) to zlahka prenese.
function drawCenterPlate(ctx, size, bg) {
  const boxSize = Math.round(size * 0.26);
  const margin = Math.round(size * 0.02);
  const boxX = (size - boxSize) / 2;
  const boxY = (size - boxSize) / 2;
  const r = Math.round(boxSize * 0.18);
  ctx.beginPath();
  ctx.moveTo(boxX + r, boxY);
  ctx.arcTo(boxX + boxSize, boxY, boxX + boxSize, boxY + boxSize, r);
  ctx.arcTo(boxX + boxSize, boxY + boxSize, boxX, boxY + boxSize, r);
  ctx.arcTo(boxX, boxY + boxSize, boxX, boxY, r);
  ctx.arcTo(boxX, boxY, boxX + boxSize, boxY, r);
  ctx.closePath();
  ctx.fillStyle = bg;
  ctx.fill();
  return boxSize - 2 * margin;
}

async function generate(opts) {
  const dotsColor = opts.gradientStops
    ? {
        gradient: {
          type: "linear",
          rotation: Math.PI / 4,
          colorStops: [
            { offset: 0, color: opts.gradientStops[0] },
            { offset: 1, color: opts.gradientStops[1] },
          ],
        },
      }
    : { color: opts.color };

  const cornerColor =
    opts.cornerColor || (opts.gradientStops ? opts.gradientStops[0] : opts.color);

  const cornerSquareType =
    opts.dotStyle === "dots" ? "dot" : opts.dotStyle === "square" ? "square" : "extra-rounded";

  const qr = new QRCodeStyling({
    width: opts.size,
    height: opts.size,
    type: "canvas",
    data: opts.url,
    margin: Math.round(opts.size * 0.03),
    qrOptions: { errorCorrectionLevel: "H" },
    dotsOptions: { type: opts.dotStyle, ...dotsColor },
    backgroundOptions: { color: opts.bg },
    cornersSquareOptions: { type: cornerSquareType, color: cornerColor },
    cornersDotOptions: { color: cornerColor },
  });

  const blob = await qr.getRawData("png");
  const qrImg = await blobToImage(blob);

  const canvas = document.createElement("canvas");
  canvas.width = opts.size;
  canvas.height = opts.size;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(qrImg, 0, 0, opts.size, opts.size);

  if (opts.logoImg) {
    const box = drawCenterPlate(ctx, opts.size, opts.bg);
    const iw = opts.logoImg.naturalWidth || opts.logoImg.width;
    const ih = opts.logoImg.naturalHeight || opts.logoImg.height;
    const scale = Math.min(box / iw, box / ih);
    const w = iw * scale, h = ih * scale;
    ctx.drawImage(opts.logoImg, (opts.size - w) / 2, (opts.size - h) / 2, w, h);
  } else if (opts.text) {
    const box = drawCenterPlate(ctx, opts.size, opts.bg);
    ctx.fillStyle = opts.gradientStops ? opts.gradientStops[0] : opts.color;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    let fontSize = Math.round(box * 0.6);
    do {
      ctx.font = `bold ${fontSize}px sans-serif`;
      fontSize -= 2;
    } while (ctx.measureText(opts.text).width > box && fontSize > 8);
    ctx.fillText(opts.text, opts.size / 2, opts.size / 2);
  }

  return canvas.toDataURL("image/png");
}

$("run").addEventListener("click", async () => {
  const errBox = $("error");
  errBox.hidden = true;
  const centerType = document.querySelector("input[name=center]:checked").value;

  try {
    const url = $("url").value.trim();
    if (!url) throw new Error("Vpiši URL / vsebino kode.");

    const size = Number($("size").value);
    if (!Number.isInteger(size) || size < 100 || size > 4000)
      throw new Error("Velikost mora biti med 100 in 4000 px.");

    const hex = /^#[0-9a-fA-F]{3,8}$/;
    const color = $("color").value.trim();
    const bg = $("bg").value.trim();
    if (!hex.test(color)) throw new Error(`Neveljavna barva pik: "${color}"`);
    if (!hex.test(bg)) throw new Error(`Neveljavna barva ozadja: "${bg}"`);

    const opts = { url, size, color, bg, dotStyle: $("dotStyle").value };

    if ($("useGradient").checked) {
      const g2 = $("gradient2").value.trim();
      if (!hex.test(g2)) throw new Error(`Neveljavna druga barva gradienta: "${g2}"`);
      opts.gradientStops = [color, g2];
    }
    if ($("useCorner").checked) {
      const cc = $("cornerColor").value.trim();
      if (!hex.test(cc)) throw new Error(`Neveljavna barva kotov: "${cc}"`);
      opts.cornerColor = cc;
    }

    if (centerType === "image") {
      const f = $("logoFile").files[0];
      if (!f) throw new Error("Izberi datoteko s sliko za sredino.");
      opts.logoImg = await loadImageFromFile(f);
    } else if (centerType === "text") {
      opts.text = $("centerText").value.trim();
      if (!opts.text) throw new Error("Vpiši tekst za sredino.");
    }

    $("run").disabled = true;
    $("run").textContent = "Generiram ...";

    const dataUrl = await generate(opts);
    const name = ($("filename").value.trim() || "qr-koda").replace(/\.png$/i, "") + ".png";

    $("result").innerHTML = `
      <img src="${dataUrl}" alt="QR koda">
      <div class="hint">${opts.size} × ${opts.size} px</div>
      <a class="dl" href="${dataUrl}" download="${name}">Prenesi PNG</a>`;
  } catch (err) {
    errBox.textContent = err.message;
    errBox.hidden = false;
  } finally {
    $("run").disabled = false;
    $("run").textContent = "Zaženi";
  }
});
</script>
</body>
</html>
