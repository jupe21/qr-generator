<!doctype html>
<html lang="sl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Generator</title>

    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b1220;
        color: white;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px;
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 28px;
      }

      .card {
        background: #111827;
        border: 1px solid #263244;
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 18px;
        font-size: 34px;
      }

      label {
        display: block;
        margin-top: 14px;
        margin-bottom: 6px;
        color: #cbd5e1;
        font-size: 14px;
      }

      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #0f172a;
        color: white;
        font-size: 15px;
      }

      input[type="color"] {
        height: 45px;
        padding: 4px;
      }

      button {
        margin-top: 18px;
        width: 100%;
        padding: 13px;
        border: 0;
        border-radius: 12px;
        background: #22d3ee;
        color: #08111f;
        font-weight: 700;
        cursor: pointer;
        font-size: 15px;
      }

      button.secondary {
        background: #334155;
        color: white;
      }

      #qr {
        background: white;
        border-radius: 18px;
        padding: 18px;
        min-height: 360px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .hint {
        margin-top: 14px;
        color: #94a3b8;
        font-size: 13px;
        line-height: 1.5;
      }

      @media (max-width: 900px) {
        .wrap {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <h1>QR Generator</h1>

        <label>URL / vsebina QR kode</label>
        <input id="url" value="https://n3x7.si" placeholder="https://..." />

        <div class="row">
          <div>
            <label>Velikost</label>
            <input id="size" type="number" value="1000" min="200" max="3000" />
          </div>

          <div>
            <label>Stil pik</label>
            <select id="dotStyle">
              <option value="rounded">Rounded</option>
              <option value="dots">Dots</option>
              <option value="square">Square</option>
              <option value="classy">Classy</option>
              <option value="classy-rounded">Classy rounded</option>
              <option value="extra-rounded">Extra rounded</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label>Barva pik</label>
            <input id="color" type="color" value="#1e293b" />
          </div>

          <div>
            <label>Barva ozadja</label>
            <input id="bg" type="color" value="#ffffff" />
          </div>
        </div>

        <div class="row">
          <div>
            <label>Barva kotov</label>
            <input id="cornerColor" type="color" value="#1e293b" />
          </div>

          <div>
            <label>Druga barva gradienta</label>
            <input id="gradient2" type="color" value="#8b5cf6" />
          </div>
        </div>

        <label>
          <input id="useGradient" type="checkbox" style="width: auto" />
          Uporabi gradient
        </label>

        <label>Sredina QR kode</label>
        <select id="centerType">
          <option value="none">Brez</option>
          <option value="text">Tekst</option>
          <option value="image">Slika / logo</option>
        </select>

        <label>Tekst na sredini</label>
        <input id="centerText" placeholder="npr. N7" />

        <label>Logo / slika</label>
        <input id="imageInput" type="file" accept="image/*" />

        <label>Ime datoteke</label>
        <input id="filename" value="qr-koda.png" />

        <button onclick="generateQr()">Generiraj QR</button>
        <button class="secondary" onclick="downloadQr()">Prenesi PNG</button>

        <div class="hint">
          Ta verzija dela direktno v brskalniku, zato na Vercelu ne potrebuje
          serverja, canvasa ali serverless funkcij.
        </div>
      </div>

      <div class="card">
        <div id="qr"></div>
      </div>
    </div>

    <script>
      let qrCode = null;
      let logoDataUrl = null;

      const imageInput = document.getElementById("imageInput");

      imageInput.addEventListener("change", () => {
        const file = imageInput.files[0];

        if (!file) {
          logoDataUrl = null;
          return;
        }

        const reader = new FileReader();

        reader.onload = () => {
          logoDataUrl = reader.result;
        };

        reader.readAsDataURL(file);
      });

      function getCornerType(dotStyle) {
        if (dotStyle === "dots") return "dot";
        if (dotStyle === "square") return "square";
        return "extra-rounded";
      }

      function generateQr() {
        const url = document.getElementById("url").value.trim();
        const size = Number(document.getElementById("size").value) || 1000;
        const color = document.getElementById("color").value;
        const bg = document.getElementById("bg").value;
        const cornerColor = document.getElementById("cornerColor").value;
        const gradient2 = document.getElementById("gradient2").value;
        const useGradient = document.getElementById("useGradient").checked;
        const dotStyle = document.getElementById("dotStyle").value;
        const centerType = document.getElementById("centerType").value;
        const centerText = document.getElementById("centerText").value.trim();

        if (!url) {
          alert("Vnesi URL ali vsebino QR kode.");
          return;
        }

        const dotsOptions = useGradient
          ? {
              type: dotStyle,
              gradient: {
                type: "linear",
                rotation: Math.PI / 4,
                colorStops: [
                  { offset: 0, color },
                  { offset: 1, color: gradient2 },
                ],
              },
            }
          : {
              type: dotStyle,
              color,
            };

        const image =
          centerType === "image" && logoDataUrl ? logoDataUrl : undefined;

        qrCode = new QRCodeStyling({
          width: size,
          height: size,
          type: "canvas",
          data: url,
          margin: Math.round(size * 0.03),
          qrOptions: {
            errorCorrectionLevel: "H",
          },
          dotsOptions,
          backgroundOptions: {
            color: bg,
          },
          cornersSquareOptions: {
            type: getCornerType(dotStyle),
            color: cornerColor,
          },
          cornersDotOptions: {
            color: cornerColor,
          },
          image,
          imageOptions: {
            crossOrigin: "anonymous",
            margin: 8,
            imageSize: 0.28,
            hideBackgroundDots: true,
          },
        });

        const qrContainer = document.getElementById("qr");
        qrContainer.innerHTML = "";
        qrCode.append(qrContainer);

        if (centerType === "text" && centerText) {
          setTimeout(() => addCenterText(centerText, color, bg), 200);
        }
      }

      function addCenterText(text, color, bg) {
        const canvas = document.querySelector("#qr canvas");
        if (!canvas) return;

        const ctx = canvas.getContext("2d");
        const size = canvas.width;
        const boxSize = Math.round(size * 0.26);
        const x = (size - boxSize) / 2;
        const y = (size - boxSize) / 2;
        const r = Math.round(boxSize * 0.18);

        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + boxSize, y, x + boxSize, y + boxSize, r);
        ctx.arcTo(x + boxSize, y + boxSize, x, y + boxSize, r);
        ctx.arcTo(x, y + boxSize, x, y, r);
        ctx.arcTo(x, y, x + boxSize, y, r);
        ctx.closePath();
        ctx.fillStyle = bg;
        ctx.fill();

        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        let fontSize = Math.round(boxSize * 0.45);

        do {
          ctx.font = `bold ${fontSize}px Arial`;
          fontSize -= 2;
        } while (ctx.measureText(text).width > boxSize * 0.8 && fontSize > 10);

        ctx.fillText(text, size / 2, size / 2);
      }

      function downloadQr() {
        const canvas = document.querySelector("#qr canvas");

        if (!canvas) {
          alert("Najprej generiraj QR kodo.");
          return;
        }

        const filenameInput = document.getElementById("filename").value.trim();
        const filename = filenameInput.endsWith(".png")
          ? filenameInput
          : `${filenameInput || "qr-koda"}.png`;

        const link = document.createElement("a");
        link.download = filename;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      generateQr();
    </script>
  </body>
</html>
